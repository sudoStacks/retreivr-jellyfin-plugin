name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Compute version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          IFS='.' read -r -a PARTS <<< "$TAG"
          if [ "${#PARTS[@]}" -eq 3 ]; then
            VERSION="${PARTS[0]}.${PARTS[1]}.${PARTS[2]}.0"
          else
            VERSION="$TAG"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp version files
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s#<Version>.*</Version>#<Version>${VERSION}</Version>#" Directory.Build.props
          sed -i "s#<AssemblyVersion>.*</AssemblyVersion>#<AssemblyVersion>${VERSION}</AssemblyVersion>#" Directory.Build.props
          sed -i "s#<FileVersion>.*</FileVersion>#<FileVersion>${VERSION}</FileVersion>#" Directory.Build.props
          sed -i "s#version: \".*\"#version: \"${VERSION}\"#" build.yaml
          python3 - <<'PY'
from pathlib import Path
import json
from datetime import datetime, timezone

manifest_path = Path("manifest.json")
payload = json.loads(manifest_path.read_text(encoding="utf-8"))
entry = payload[0]
version = "${{ steps.version.outputs.version }}"
versions = entry.get("versions") or [{}]
item = versions[0]
item["version"] = version
item["timestamp"] = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
item["sourceUrl"] = "https://github.com/sudoStacks/retreivr-jellyfin-plugin/releases/latest/download/Retreivr.Jellyfin.Plugin.zip"
entry["versions"] = [item]
manifest_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
PY

      - name: Update manifest on main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add manifest.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update plugin manifest for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Restore
        run: dotnet restore Retreivr.Jellyfin.Plugin.sln

      - name: Publish
        run: dotnet publish src/Retreivr.Jellyfin.Plugin/Retreivr.Jellyfin.Plugin.csproj -c Release -o artifacts/publish

      - name: Prepare package
        shell: bash
        run: |
          mkdir -p artifacts/package
          cp build.yaml artifacts/package/build.yaml
          cp artifacts/publish/Retreivr.Jellyfin.Plugin.dll artifacts/package/
          if [ -f artifacts/publish/Retreivr.Jellyfin.Plugin.pdb ]; then
            cp artifacts/publish/Retreivr.Jellyfin.Plugin.pdb artifacts/package/
          fi
          cd artifacts/package
          zip -r ../Retreivr.Jellyfin.Plugin.zip .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Retreivr.Jellyfin.Plugin.zip
            manifest.json
