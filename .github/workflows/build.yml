name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Retreivr.Jellyfin.Plugin.sln

      - name: Build
        run: dotnet build Retreivr.Jellyfin.Plugin.sln -c Release --no-restore
