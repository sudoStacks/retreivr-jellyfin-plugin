<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Retreivr</title>
</head>
<body>
  <div id="RetreivrConfigPage" data-role="page" class="page type-interior pluginConfigurationPage">
    <div data-role="content">
      <div class="content-primary">
        <form id="RetreivrConfigForm">
          <div class="sectionTitleContainer flex align-items-center">
            <h2 class="sectionTitle">Retreivr</h2>
          </div>

          <div class="inputContainer">
            <label class="inputLabel inputLabelUnfocused" for="ResolutionApiBaseUrl">Resolution API Base URL</label>
            <input id="ResolutionApiBaseUrl" name="ResolutionApiBaseUrl" type="text" />
          </div>

          <div class="inputContainer">
            <label class="inputLabel inputLabelUnfocused" for="ResolutionApiKey">Resolution API Key</label>
            <input id="ResolutionApiKey" name="ResolutionApiKey" type="password" />
          </div>

          <div class="inputContainer">
            <label class="inputLabel inputLabelUnfocused" for="RetreivrCoreBaseUrl">Retreivr Core Base URL</label>
            <input id="RetreivrCoreBaseUrl" name="RetreivrCoreBaseUrl" type="text" />
          </div>

          <div class="inputContainer">
            <label class="inputLabel inputLabelUnfocused" for="RetreivrCoreApiKey">Retreivr Core API Key</label>
            <input id="RetreivrCoreApiKey" name="RetreivrCoreApiKey" type="password" />
          </div>

          <div class="checkboxContainer checkboxContainer-withDescription">
            <label>
              <input id="EnableAvailabilityBadges" name="EnableAvailabilityBadges" type="checkbox" />
              <span>Enable availability badges</span>
            </label>
          </div>

          <div class="checkboxContainer checkboxContainer-withDescription">
            <label>
              <input id="EnableInstantResolvedPlayback" name="EnableInstantResolvedPlayback" type="checkbox" />
              <span>Enable instant resolved playback</span>
            </label>
          </div>

          <div class="checkboxContainer checkboxContainer-withDescription">
            <label>
              <input id="EnableRetreivrDownloadActions" name="EnableRetreivrDownloadActions" type="checkbox" />
              <span>Enable Retreivr download actions</span>
            </label>
          </div>

          <div class="inputContainer">
            <label class="inputLabel inputLabelUnfocused" for="RequestTimeoutSeconds">Request timeout seconds</label>
            <input id="RequestTimeoutSeconds" name="RequestTimeoutSeconds" type="number" min="1" step="1" />
          </div>

          <button is="emby-button" type="submit" class="raised button-submit block">
            <span>Save</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    const pluginId = "5fe1b9d8-2f4d-48d9-8fc3-f37b4760a96f";
    const readConfigValue = (config, pascalName, fallback) => {
      if (!config || typeof config !== "object") {
        return fallback;
      }
      if (config[pascalName] !== undefined) {
        return config[pascalName];
      }
      const camelName = pascalName.charAt(0).toLowerCase() + pascalName.slice(1);
      if (config[camelName] !== undefined) {
        return config[camelName];
      }
      return fallback;
    };

    document.querySelector("#RetreivrConfigPage")
      .addEventListener("pageshow", function () {
        Dashboard.showLoadingMsg();
        ApiClient.getPluginConfiguration(pluginId).then(function (config) {
          document.querySelector("#ResolutionApiBaseUrl").value = readConfigValue(config, "ResolutionApiBaseUrl", "http://localhost:8000") || "";
          document.querySelector("#ResolutionApiKey").value = readConfigValue(config, "ResolutionApiKey", "") || "";
          document.querySelector("#RetreivrCoreBaseUrl").value = readConfigValue(config, "RetreivrCoreBaseUrl", "http://localhost:8000") || "";
          document.querySelector("#RetreivrCoreApiKey").value = readConfigValue(config, "RetreivrCoreApiKey", "") || "";
          document.querySelector("#EnableAvailabilityBadges").checked = !!readConfigValue(config, "EnableAvailabilityBadges", true);
          document.querySelector("#EnableInstantResolvedPlayback").checked = !!readConfigValue(config, "EnableInstantResolvedPlayback", false);
          document.querySelector("#EnableRetreivrDownloadActions").checked = !!readConfigValue(config, "EnableRetreivrDownloadActions", true);
          document.querySelector("#RequestTimeoutSeconds").value = Number(readConfigValue(config, "RequestTimeoutSeconds", 5) || 5);
          Dashboard.hideLoadingMsg();
        });
      });

    document.querySelector("#RetreivrConfigForm")
      .addEventListener("submit", function (event) {
        event.preventDefault();
        Dashboard.showLoadingMsg();
        ApiClient.getPluginConfiguration(pluginId).then(function (config) {
          const resolutionApiBaseUrl = document.querySelector("#ResolutionApiBaseUrl").value;
          const resolutionApiKey = document.querySelector("#ResolutionApiKey").value;
          const retreivrCoreBaseUrl = document.querySelector("#RetreivrCoreBaseUrl").value;
          const retreivrCoreApiKey = document.querySelector("#RetreivrCoreApiKey").value;
          const enableAvailabilityBadges = document.querySelector("#EnableAvailabilityBadges").checked;
          const enableInstantResolvedPlayback = document.querySelector("#EnableInstantResolvedPlayback").checked;
          const enableRetreivrDownloadActions = document.querySelector("#EnableRetreivrDownloadActions").checked;
          const requestTimeoutSeconds = parseInt(document.querySelector("#RequestTimeoutSeconds").value || "5", 10);

          config.ResolutionApiBaseUrl = resolutionApiBaseUrl;
          config.resolutionApiBaseUrl = resolutionApiBaseUrl;
          config.ResolutionApiKey = resolutionApiKey;
          config.resolutionApiKey = resolutionApiKey;
          config.RetreivrCoreBaseUrl = retreivrCoreBaseUrl;
          config.retreivrCoreBaseUrl = retreivrCoreBaseUrl;
          config.RetreivrCoreApiKey = retreivrCoreApiKey;
          config.retreivrCoreApiKey = retreivrCoreApiKey;
          config.EnableAvailabilityBadges = enableAvailabilityBadges;
          config.enableAvailabilityBadges = enableAvailabilityBadges;
          config.EnableInstantResolvedPlayback = enableInstantResolvedPlayback;
          config.enableInstantResolvedPlayback = enableInstantResolvedPlayback;
          config.EnableRetreivrDownloadActions = enableRetreivrDownloadActions;
          config.enableRetreivrDownloadActions = enableRetreivrDownloadActions;
          config.RequestTimeoutSeconds = requestTimeoutSeconds;
          config.requestTimeoutSeconds = requestTimeoutSeconds;
          ApiClient.updatePluginConfiguration(pluginId, config).then(Dashboard.processPluginConfigurationUpdateResult);
        });
      });
  </script>
</body>
</html>
